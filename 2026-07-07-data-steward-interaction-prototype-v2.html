<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Steward — Interaction Prototype v2</title>
<style>
  :root{
    --blue:#2f6fed; --blue-dark:#1f4fc4; --blue-bg:#eef3ff;
    --orange:#f59e0b; --orange-bg:#fffaf0; --orange-border:#fbd38d;
    --ink:#1f2430; --muted:#6b7280; --line:#e5e7eb; --line-soft:#eef0f2;
    --card:#ffffff; --page:#f4f5f7; --green:#16a34a; --red:#dc2626;
    --violet:#6b3fd4; --violet-bg:#f2ecff; --violet-border:#ddd0ff;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--page);color:var(--ink);}
  .app-shell{max-width:1180px;margin:0 auto;padding:20px 20px 60px;}

  /* ---- toolbar ---- */
  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
  .toolbar h1{font-size:15px;margin:0;white-space:nowrap;}
  .toolbar .sub{font-size:12px;color:var(--muted);}
  .toolbar select{margin-left:auto;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;min-width:320px;}
  .navbtn{border:1px solid var(--line);background:#fff;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--ink);}
  .navbtn:hover{background:var(--blue-bg);border-color:var(--blue);}

  .viewing-banner{display:flex;align-items:center;gap:10px;background:var(--blue-bg);border:1px solid #c7d9ff;color:var(--blue-dark);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:13px;}
  .viewing-banner b{font-weight:700;}
  .viewing-banner .count{margin-left:auto;color:var(--muted);font-size:12px;}
  .legend{font-size:11.5px;color:var(--muted);margin:-8px 0 16px;padding-left:2px;}
  .legend .star{color:var(--violet);font-weight:700;}

  /* ---- layout: mock panel + annotation rail ---- */
  .stage{display:grid;grid-template-columns:440px 1fr;gap:34px;align-items:flex-start;}
  @media (max-width:920px){.stage{grid-template-columns:1fr;}}

  .flow{display:none;}
  .flow.active{display:grid;grid-template-columns:440px 1fr;gap:34px;grid-column:1/-1;}
  @media (max-width:920px){.flow.active{grid-template-columns:1fr;}}

  /* ---- the mocked Data Steward panel (the real product surface — deliberately elevated) ---- */
  .steward-panel{background:#fff;border:1px solid #cfd5df;border-radius:16px;box-shadow:0 20px 48px rgba(20,30,60,0.18), 0 3px 8px rgba(20,30,60,0.08);overflow:hidden;display:flex;flex-direction:column;min-height:560px;position:relative;}
  .steward-panel::before{content:"";position:absolute;inset:0;border-radius:16px;border:1px solid rgba(107,63,212,0.10);pointer-events:none;}
  .steward-header{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#f5f0ff 0%,#ffffff 100%);}
  .steward-header .title{font-weight:700;font-size:14px;}
  .steward-header .title::before{content:"✦";color:var(--violet);margin-right:7px;font-size:13px;}
  .steward-header .chip{margin-left:8px;font-size:11px;background:var(--blue-bg);color:var(--blue-dark);border:1px solid #c7d9ff;padding:2px 8px;border-radius:999px;}
  .steward-header .newchat{margin-left:auto;font-size:12px;color:var(--muted);}

  .steward-body{flex:1;padding:16px;overflow-y:auto;font-size:13px;line-height:1.5;display:flex;flex-direction:column;gap:12px;background:#fbfcfe;}
  .msg-user{align-self:flex-end;background:var(--blue);color:#fff;border-radius:12px 12px 3px 12px;padding:9px 13px;max-width:88%;box-shadow:0 1px 2px rgba(20,30,60,0.10);}
  .msg-user .thumb{background:repeating-linear-gradient(45deg,#5b8cf0,#5b8cf0 6px,#7aa0f4 6px,#7aa0f4 12px);border-color:#5b8cf0;color:#fff;}
  .msg-agent{align-self:flex-start;background:#fff;max-width:92%;border:1px solid #e7e9ee;border-radius:12px 12px 12px 3px;padding:10px 13px;box-shadow:0 1px 2px rgba(20,30,60,0.06);}
  .msg-agent .stamp{font-size:11px;color:var(--muted);margin-top:4px;}

  .chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .sugg-chip{border:1px solid var(--blue);color:var(--blue);background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:default;}

  .plan-card{border:1px solid var(--orange-border);background:var(--orange-bg);border-radius:10px;padding:12px 14px;margin-top:4px;}
  .plan-card h4{margin:0 0 8px;font-size:13px;}
  .plan-card ul{margin:0 0 10px;padding-left:18px;font-size:12.5px;}
  .plan-card li{margin-bottom:4px;}
  .btn{border:none;border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-primary.blue{background:var(--blue);}
  .btn-link{background:none;color:var(--blue-dark);padding:7px 4px;text-decoration:underline;}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .row-gap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

  .steward-composer{border-top:1px solid var(--line);padding:10px 12px;background:#fff;}
  .composer-box{border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .composer-box .ph{color:#9aa1ac;font-size:13px;}
  .composer-tools{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .icon-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}
  .looking-at{font-size:11px;background:var(--blue-bg);color:var(--blue-dark);border:1px solid #c7d9ff;border-radius:999px;padding:3px 9px;}
  .composer-send{margin-left:auto;width:30px;height:30px;border-radius:8px;background:var(--blue);color:#fff;border:none;cursor:pointer;}

  /* ---- annotation rail (design notes — deliberately flat, secondary to the chat) ---- */
  .annotations{background:#f7f8fa;border:1px dashed #d3d8e0;border-radius:10px;padding:16px 18px;font-size:13px;}
  .anno-label{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#9aa1ac;font-weight:700;margin-bottom:10px;}
  .annotations h3{margin:0 0 4px;font-size:14px;}
  .annotations .desc{color:var(--muted);font-size:12.5px;margin-bottom:14px;}
  .annotations .origin{display:inline-block;font-size:11px;background:var(--violet-bg);color:var(--violet);border:1px solid var(--violet-border);border-radius:999px;padding:2px 9px;margin-bottom:12px;}
  .callout{display:flex;gap:10px;padding:10px 0;border-top:1px solid #e3e6ea;}
  .callout:first-of-type{border-top:none;}
  .callout .num{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--muted);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .callout .txt b{display:block;font-size:12.8px;margin-bottom:2px;}
  .callout .txt span{font-size:12.5px;color:var(--muted);}
  .highlight{outline:2px dashed var(--orange);outline-offset:2px;border-radius:8px;}

  /* ---- flow-specific extras ---- */
  .lib-panel{border:1px solid var(--line);border-radius:10px;margin:0 0 10px;background:#fafbfc;}
  .lib-tabs{display:flex;gap:4px;padding:8px 8px 0;}
  .lib-tab{font-size:12px;padding:6px 10px;border-radius:7px 7px 0 0;cursor:pointer;color:var(--muted);}
  .lib-tab.active{background:#fff;color:var(--ink);font-weight:600;border:1px solid var(--line);border-bottom:none;}
  .lib-search{margin:8px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:12px;color:#9aa1ac;background:#fff;}
  .lib-item{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:12.5px;border-top:1px solid var(--line-soft);}
  .lib-item b{font-weight:600;font-size:12.5px;}
  .lib-item span{color:var(--muted);font-size:11.5px;}
  .lib-item .insert{margin-left:auto;font-size:11.5px;color:var(--blue);cursor:pointer;font-weight:600;}
  .lib-save{padding:8px 10px;font-size:12px;color:var(--blue-dark);border-top:1px dashed var(--line);cursor:pointer;}

  .cite{display:inline-block;background:var(--blue-bg);color:var(--blue-dark);border:1px solid #c7d9ff;border-radius:6px;padding:1px 6px;font-size:11px;cursor:pointer;margin-left:2px;}
  .cite-snippet{display:none;margin-top:8px;background:#fafbfc;border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--muted);}
  .cite-snippet.show{display:block;}

  .proposed-box{border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fafbfc;position:relative;}
  .proposed-box .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
  .pencil-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12px;}
  .pencil-btn:hover{border-color:var(--blue);color:var(--blue);}
  .edit-mode{display:none;}
  .edit-mode.show{display:block;}
  .view-mode.hide{display:none;}
  textarea.edit-ta{width:100%;min-height:64px;border:1px solid var(--blue);border-radius:7px;padding:8px;font-size:12.5px;font-family:inherit;resize:vertical;}

  .step-row{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;background:#fff;}
  .step-row .drag{color:#c2c7cf;cursor:grab;padding-top:2px;}
  .step-row .body{flex:1;}
  .step-row .body b{font-size:12.5px;}
  .step-row .body p{margin:2px 0 0;font-size:12px;color:var(--muted);}
  .step-actions{display:flex;gap:4px;}
  .mini-icon{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11px;}
  .badge-edited{font-size:10px;background:var(--blue-bg);color:var(--blue-dark);border-radius:999px;padding:1px 7px;margin-left:6px;}

  .tabbar{display:flex;gap:6px;margin-bottom:10px;}
  .tabbtn{font-size:12.5px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;}
  .tabbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .field-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;margin:10px 0 4px;}
  .pill{display:inline-block;font-size:11.5px;border:1px solid var(--line);border-radius:999px;padding:4px 10px;margin-right:6px;margin-bottom:6px;background:#fff;}
  .pill.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-dark);}
  .radio-row{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;margin-bottom:8px;}
  .run-card{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px;background:#fff;}
  .run-card .top{display:flex;align-items:center;gap:8px;}
  .status{font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 8px;}
  .status.ok{background:#eafaf0;color:var(--green);}
  .status.review{background:#fff7e6;color:#b45309;}
  .status.fail{background:#fdeaea;color:var(--red);}
  .run-card .meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .run-card .links{margin-top:6px;font-size:11.5px;}
  .run-card .links a{color:var(--blue);text-decoration:none;margin-right:12px;font-weight:600;}

  .thumb{width:120px;height:78px;border-radius:6px;border:1px solid var(--line);background:repeating-linear-gradient(45deg,#f4f5f7,#f4f5f7 6px,#eceef1 6px,#eceef1 12px);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);margin-bottom:6px;}

  .barchart{display:flex;align-items:flex-end;gap:6px;height:70px;margin:8px 0;}
  .barchart .bar{flex:1;background:var(--blue);border-radius:3px 3px 0 0;position:relative;}
  .barchart .bar span{position:absolute;bottom:-16px;left:0;right:0;text-align:center;font-size:9.5px;color:var(--muted);}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px;}
  .kpi{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;}
  .kpi b{font-size:15px;display:block;}
  .kpi span{font-size:11px;color:var(--muted);}

  .tour-card{border:1px solid var(--line);border-radius:10px;padding:14px;background:#fafbfc;}
  .dots{display:flex;gap:6px;margin:10px 0;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .dot.on{background:var(--blue);}
  .checklist-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12.5px;border-top:1px solid var(--line-soft);}
  .checklist-item:first-of-type{border-top:none;}
  .checkbox{width:15px;height:15px;border:1.5px solid var(--line);border-radius:4px;}

  /* ---- research-enrichment extras (v2) ---- */
  .prov-line{font-size:11.5px;color:var(--muted);margin-top:8px;}
  .prov-line .lead{font-weight:600;color:var(--ink);}
  .conf{font-size:10px;font-weight:700;border-radius:999px;padding:1px 7px;}
  .conf.hi{background:#eafaf0;color:var(--green);}
  .conf.med{background:#fff7e6;color:#b45309;}
  .conf.lo{background:#fdeaea;color:var(--red);}
  .thumbs{display:flex;gap:6px;margin-top:8px;align-items:center;}
  .thumb-btn{width:30px;height:27px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12px;}
  .thumb-btn.sel-up{border-color:var(--green);background:#eafaf0;}
  .thumb-btn.sel-down{border-color:var(--red);background:#fdeaea;}
  .thumbs .flag{font-size:11.5px;color:var(--blue);cursor:pointer;margin-left:auto;font-weight:600;}
  .progress-track{height:8px;border-radius:999px;background:var(--line);overflow:hidden;}
  .progress-fill{height:100%;background:var(--blue);width:66%;}
  .progress-label{font-size:11.5px;color:var(--muted);margin-top:5px;}
  .nudge{display:flex;gap:10px;background:var(--orange-bg);border:1px solid var(--orange-border);border-radius:10px;padding:10px 12px;}
  .nudge .ic{font-size:16px;line-height:1.2;}
  .impact-list{border:1px solid var(--line);border-radius:8px;margin-top:8px;background:#fff;}
  .impact-list .ii{display:flex;gap:8px;align-items:center;padding:7px 10px;font-size:12px;border-top:1px solid var(--line-soft);}
  .impact-list .ii:first-child{border-top:none;}
  .impact-list .ii .k{margin-left:auto;font-size:11px;color:var(--red);white-space:nowrap;}
  .warn-head{display:flex;gap:8px;align-items:center;font-size:12.5px;font-weight:700;color:#b45309;margin-bottom:2px;}
  .op-row{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:6px 0;border-top:1px solid var(--line-soft);}
  .op-row:first-child{border-top:none;}
  .op-row .st{margin-left:auto;}
  .hist-row{display:flex;gap:8px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line-soft);}
  .hist-row:first-child{border-top:none;}
  .hist-row .undo{margin-left:auto;font-size:11.5px;color:var(--blue);cursor:pointer;font-weight:600;white-space:nowrap;}
  .ai-tag{font-size:10px;background:var(--violet-bg);color:var(--violet);border:1px solid var(--violet-border);border-radius:999px;padding:1px 6px;margin-left:6px;}
</style>
</head>
<body>
<div class="app-shell">

  <div class="toolbar">
    <div>
      <h1>Data Steward — Interaction Prototype v2</h1>
      <div class="sub">Ondra · AI Steward improvements · original 8 proposals + research enrichment · scoped to the Steward panel only</div>
    </div>
    <button class="navbtn" id="prevBtn" title="Previous flow">‹</button>
    <select id="flowSelect"></select>
    <button class="navbtn" id="nextBtn" title="Next flow">›</button>
  </div>

  <div class="viewing-banner">
    <span>Viewing:</span> <b id="viewingName"></b>
    <span class="count" id="viewingCount"></span>
  </div>
  <div class="legend"><span class="star">✦</span> = new in v2, added from the top-tier agent research (2026-07-07). Flows 0–8 are unchanged from your original prototype.</div>

  <div class="stage" id="stage"></div>

</div>

<script>
const flows = [
  {
    id: "baseline",
    name: "0 · Current state (baseline)",
    note: "This is today's implementation, reconstructed from your screenshots. Every other flow in this prototype is a proposed change layered on top of this.",
    callouts: [
      ["No source control on knowledge", "Agent explicitly states it cannot read documentation, URLs, or files — only the live catalog and training knowledge."],
      ["Plan is accept-all / decline-all", "The orange plan card only offers Execute Plan or Decline for the whole plan — no way to adjust a single step or a single proposed value."],
      ["No memory of past runs", "Nothing in the panel shows whether this task has run before, on a schedule, or what the last outcome was."]
    ],
    body: `
      <div class="steward-header"><span class="title">Data Steward</span><span class="newchat" style="margin-left:auto">New chat ▾</span></div>
      <div class="steward-body">
        <div class="msg-agent">The delete action only removes the catalog entry, metadata, links, and lineage from Zeenea. The table will reappear if the scanner runs again unless excluded from scan configuration.<br><br><b>Recommendation:</b> before deleting, consider whether the intent is to remove it permanently or just suppress it from the catalog.
          <div class="chips-row">
            <span class="sugg-chip">Explore DP_test process</span>
            <span class="sugg-chip">Explore public.data_vendor</span>
            <span class="sugg-chip">Explore Monthly sales KPI</span>
          </div>
          <div class="stamp">Jun 29, 2026, 1:35 PM</div>
        </div>
        <div class="msg-user">Can you read Studio's technical documentation?</div>
        <div class="msg-agent">No, I cannot. I don't have access to any external URLs, documentation sites, file systems, or web resources. My knowledge is limited to the active catalog and built-in training knowledge.
          <div class="stamp">Jun 29, 2026, 1:39 PM</div>
        </div>
        <div class="plan-card">
          <h4>Steward proposes a plan</h4>
          <ul>
            <li>Write a dataset description</li>
            <li>Assign contacts</li>
            <li>Fill required &amp; important properties</li>
            <li>Link additional glossary terms (Implements)</li>
          </ul>
          <div class="row-gap"><button class="btn btn-primary">Execute Plan</button><button class="btn btn-link">Decline</button></div>
        </div>
      </div>
      <div class="steward-composer">
        <div class="composer-box"><span class="ph">Give Steward a task</span></div>
        <div class="composer-tools">
          <span class="looking-at">Dataset · ACTUAL_SALES</span>
          <button class="icon-btn" style="margin-left:auto;width:auto;padding:0 10px;">Plan</button>
          <button class="composer-send">↑</button>
        </div>
      </div>
    `
  },
  {
    id: "prompts",
    name: "1 · Reusable prompts",
    note: "A prompt library lives in the composer so stewards can save, share, and re-run the tasks they repeat weekly instead of retyping them.",
    callouts: [
      ["Library icon in composer", "New icon opens a saved-prompt library without leaving the chat."],
      ["Personal vs. team scope", "Tabs separate prompts you saved for yourself from ones your team lead has published — avoids one steward's shorthand confusing another."],
      ["Save current draft", "Any task you type can be saved as a reusable prompt in one click, with variables like {dataset} inferred automatically."],
      ["Open question", "Who can publish to 'Team prompts' — any steward, or only admins? Needs a review/approval step to avoid prompt sprawl."]
    ],
    body: `
      <div class="steward-header"><span class="title">Data Steward</span><span class="newchat" style="margin-left:auto">New chat ▾</span></div>
      <div class="steward-body">
        <div class="lib-panel highlight">
          <div class="lib-tabs">
            <div class="lib-tab active">My prompts</div>
            <div class="lib-tab">Team prompts (12)</div>
          </div>
          <div class="lib-search">Search prompts…</div>
          <div class="lib-item"><b>Improve completion for {dataset}</b><br><span>Used 34 times</span><span class="insert">Insert</span></div>
          <div class="lib-item"><b>Summarize orphan datasets</b><br><span>Used 11 times</span><span class="insert">Insert</span></div>
          <div class="lib-item"><b>Weekly stewardship digest for {business unit}</b><br><span>Used 8 times</span><span class="insert">Insert</span></div>
          <div class="lib-save">+ Save current draft as a prompt</div>
        </div>
        <div class="msg-user">Improve completion for ACTUAL_SALES</div>
        <div class="msg-agent">Inserted from your saved prompt <i>“Improve completion for {dataset}”</i>. Looking at ACTUAL_SALES now…
          <div class="stamp">Jul 6, 2026, 9:02 AM</div>
        </div>
      </div>
      <div class="steward-composer">
        <div class="composer-box"><span class="ph">Give Steward a task</span></div>
        <div class="composer-tools">
          <button class="icon-btn active highlight" title="Prompt library">★</button>
          <span class="looking-at">Dataset · ACTUAL_SALES</span>
          <button class="composer-send" style="margin-left:auto">↑</button>
        </div>
      </div>
    `
  },
  {
    id: "docs",
    name: "2 · Agent with access to technical documentation",
    note: "Fixes the confirmed gap from the baseline transcript. Instead of refusing, the agent now answers real product questions about the Data Intelligence Platform — grounded in the docs and cited — rather than just listing which documents it has indexed.",
    callouts: [

let current = 0;
const select = document.getElementById('flowSelect');
const stage = document.getElementById('stage');

flows.forEach((f,i)=>{
  const opt = document.createElement('option');
  opt.value = i; opt.textContent = f.name;
  select.appendChild(opt);

  const sec = document.createElement('div');
  sec.className = 'flow';
  sec.id = 'flow-'+f.id;
  sec.innerHTML = `
    <div class="steward-panel">${f.body}</div>
    <div class="annotations">
      <div class="anno-label">Flow notes</div>
      <h3>${f.name}</h3>
      ${f.origin ? `<div class="origin">${f.origin}</div>` : ``}
      <div class="desc">${f.note}</div>
      ${f.callouts.map((c,ci)=>`<div class="callout"><div class="num">${ci+1}</div><div class="txt"><b>${c[0]}</b><span>${c[1]}</span></div></div>`).join('')}
    </div>
  `;
  stage.appendChild(sec);
});

function render(){
  document.querySelectorAll('.flow').forEach(el=>el.classList.remove('active'));
  document.getElementById('flow-'+flows[current].id).classList.add('active');
  select.value = current;
  document.getElementById('viewingName').textContent = flows[current].name;
  document.getElementById('viewingCount').textContent = `${current+1} of ${flows.length}`;
}

select.addEventListener('change', ()=>{ current = parseInt(select.value,10); render(); });
document.getElementById('prevBtn').addEventListener('click', ()=>{ current = (current-1+flows.length)%flows.length; render(); });
document.getElementById('nextBtn').addEventListener('click', ()=>{ current = (current+1)%flows.length; render(); });

render();

// flow 3 interaction: inline edit toggle
function toggleEdit1(){
  document.getElementById('pv1').classList.add('hide');
  document.getElementById('pe1').classList.add('show');
}
function cancelEdit1(){
  document.getElementById('pv1').classList.remove('hide');
  document.getElementById('pe1').classList.remove('show');
}
function saveEdit1(){
  document.getElementById('pv1').textContent = document.getElementById('pta1').value;
  cancelEdit1();
}

// flow 5 interaction: schedule / history tabs
function showTab(showId, hideId, btn){
  document.getElementById(showId).style.display = '';
  document.getElementById(hideId).style.display = 'none';
  btn.parentElement.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// flow 13 interaction: feedback thumbs
function pickThumb(btn, dir){
  const wrap = btn.parentElement;
  wrap.querySelectorAll('.thumb-btn').forEach(b=>b.classList.remove('sel-up','sel-down'));
  btn.classList.add(dir === 'up' ? 'sel-up' : 'sel-down');
  const note = document.getElementById('fbNote');
  if(note) note.style.display = (dir === 'down') ? 'block' : 'none';
}
</script>
